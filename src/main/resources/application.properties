#APPLICATION
spring.application.name=${APP_NAME:cloudstore-user-service}
server.port=${PORT:8080}

#DB
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/test_db}
spring.datasource.username=${DB_USERNAME:test_user}
spring.datasource.password=${DB_PASSWORD:test123}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}

#PRODUCT SERVICE
fakestore-base-url=${PRODUCT_SERVICE_BASE_URL:http://fakestoreservice-env.eba-dnzki35b.eu-north-1.elasticbeanstalk.com/products}

#JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

#CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:8081,http://localhost:5173}

#SERVER
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}

#LOGS
logging.level.root=${LOG_LEVEL:INFO}





